[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npx prisma migrate deploy && node .next/standalone/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"

[[services]]
name = "web"

[[crons]]
name = "sync-scores"
schedule = "*/2 * * * *"
command = "curl -X POST $RAILWAY_PUBLIC_DOMAIN/api/cron/sync-scores -H 'Authorization: Bearer $CRON_SECRET'"

[[crons]]
name = "reminders"
schedule = "*/5 * * * *"
command = "curl -X POST $RAILWAY_PUBLIC_DOMAIN/api/cron/reminders -H 'Authorization: Bearer $CRON_SECRET'"
