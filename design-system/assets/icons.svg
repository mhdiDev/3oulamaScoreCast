<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ── App Logo ── -->
  <symbol id="icon-logo" viewBox="0 0 40 40">
    <rect width="40" height="40" rx="10" fill="url(#grad-logo)"/>
    <defs>
      <linearGradient id="grad-logo" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#154d8f"/>
        <stop offset="100%" stop-color="#3b82f6"/>
      </linearGradient>
    </defs>
    <circle cx="20" cy="20" r="11" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M14 15.5 L20 12 L26 15.5 L26 24.5 L20 28 L14 24.5 Z"
          fill="white" opacity="0.15"/>
    <circle cx="20" cy="20" r="4" fill="white"/>
    <path d="M20 9 L20 12 M20 28 L20 31 M9 20 L12 20 M28 20 L31 20"
          stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  </symbol>

  <!-- ── Football ── -->
  <symbol id="icon-ball" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12 2 L12 6 M12 18 L12 22 M2 12 L6 12 M18 12 L22 12
             M5.6 5.6 L8.5 8.5 M15.5 15.5 L18.4 18.4
             M18.4 5.6 L15.5 8.5 M8.5 15.5 L5.6 18.4"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="12,7 14.5,10 12,13 9.5,10" fill="currentColor" opacity="0.6"/>
  </symbol>

  <!-- ── Trophy ── -->
  <symbol id="icon-trophy" viewBox="0 0 24 24">
    <path d="M8 2 H16 V13 A4 4 0 0 1 8 13 Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M5 4 H8 M16 4 H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M5 4 C5 8 8 10 8 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19 4 C19 8 16 10 16 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ── Calendar ── -->
  <symbol id="icon-calendar" viewBox="0 0 24 24">
    <rect x="3" y="4" width="18" height="18" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/>
    <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="7" y="13" width="3" height="3" rx="1" fill="currentColor" opacity="0.7"/>
    <rect x="14" y="13" width="3" height="3" rx="1" fill="currentColor" opacity="0.7"/>
  </symbol>

  <!-- ── Leaderboard ── -->
  <symbol id="icon-leaderboard" viewBox="0 0 24 24">
    <rect x="2" y="14" width="5" height="8" rx="1" fill="currentColor" opacity="0.5"/>
    <rect x="9.5" y="9" width="5" height="13" rx="1" fill="currentColor"/>
    <rect x="17" y="11" width="5" height="11" rx="1" fill="currentColor" opacity="0.5"/>
    <path d="M4.5 11 L4.5 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </symbol>

  <!-- ── User / Profile ── -->
  <symbol id="icon-user" viewBox="0 0 24 24">
    <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M4 20 C4 16.7 7.6 14 12 14 C16.4 14 20 16.7 20 20"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ── Bell (notifications) ── -->
  <symbol id="icon-bell" viewBox="0 0 24 24">
    <path d="M12 3 C8.7 3 6 5.7 6 9 L6 14 L4 16 L4 17 L20 17 L20 16 L18 14 L18 9 C18 5.7 15.3 3 12 3 Z"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M10 17 C10 18.1 10.9 19 12 19 C13.1 19 14 18.1 14 17"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ── Settings / Cog ── -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12 2 L12 5 M12 19 L12 22 M2 12 L5 12 M19 12 L22 12
             M5.6 5.6 L7.8 7.8 M16.2 16.2 L18.4 18.4
             M18.4 5.6 L16.2 7.8 M7.8 16.2 L5.6 18.4"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ── Timer / Clock ── -->
  <symbol id="icon-timer" viewBox="0 0 24 24">
    <circle cx="12" cy="13" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <path d="M12 8 L12 13 L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9 2 L15 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M19.5 5.5 L21 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- ── Check ── -->
  <symbol id="icon-check" viewBox="0 0 24 24">
    <polyline points="4 12 9 17 20 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ── Home ── -->
  <symbol id="icon-home" viewBox="0 0 24 24">
    <path d="M3 12 L12 4 L21 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M5 10 L5 20 A1 1 0 0 0 6 21 L10 21 L10 16 A1 1 0 0 1 11 15 L13 15 A1 1 0 0 1 14 16 L14 21 L18 21 A1 1 0 0 0 19 20 L19 10"
          fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

</svg>
