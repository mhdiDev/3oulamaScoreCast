services:
  - type: web
    name: scorecast
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build && cp -r public .next/standalone/public && cp -r .next/static .next/standalone/.next/static
    startCommand: npx prisma migrate deploy && HOSTNAME=0.0.0.0 node .next/standalone/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: FOOTBALL_DATA_COMPETITION_ID
        value: "2000"
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true

  - type: cron
    name: sync-scores
    runtime: node
    region: frankfurt
    schedule: "*/2 * * * *"
    buildCommand: echo "no build"
    startCommand: >
      curl -s -X POST $SCORECAST_URL/api/cron/sync-scores
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: SCORECAST_URL
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: reminders
    runtime: node
    region: frankfurt
    schedule: "*/5 * * * *"
    buildCommand: echo "no build"
    startCommand: >
      curl -s -X POST $SCORECAST_URL/api/cron/reminders
      -H "Authorization: Bearer $CRON_SECRET"
    envVars:
      - key: SCORECAST_URL
        sync: false
      - key: CRON_SECRET
        sync: false
